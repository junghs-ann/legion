<!DOCTYPE html>
<html>
<head>
    <title>Activity Schema Inspector</title>
</head>
<body>
    <pre id="output">Loading...</pre>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64eMVDXBQ80UHIVU58gueRukmwjQDZ5g",
            authDomain: "legion-f319a.firebaseapp.com",
            projectId: "legion-f319a",
            storageBucket: "legion-f319a.firebasestorage.app",
            messagingSenderId: "852854704608",
            appId: "1:852854704608:web:f9fbb0962bdcea3c538385"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const out = document.getElementById('output');

        async function inspect() {
            try {
                let results = "--- Activity Schemas ---\n";
                const querySnapshot = await getDocs(collection(db, "activity_schemas"));
                querySnapshot.forEach((doc) => {
                    results += `Doc ID: [${doc.id}]\n`;
                    const data = doc.data();
                    results += `  ChurchName: [${data.churchName}]\n`;
                    // Look for "본당 사목자 지시 사항"
                    const cat = data.categories.find(c => c.title.includes("본당 사목자 지시 사항"));
                    if (cat) {
                        results += `  Category Found: [${cat.title}]\n`;
                        cat.items.forEach(item => {
                            results += `    - ${item.name} (${item.unit})\n`;
                        });
                    } else {
                        results += `  Category [본당 사목자 지시 사항] NOT FOUND\n`;
                    }
                    results += "\n";
                });
                out.textContent = results;
            } catch (e) {
                out.textContent = "Error: " + e.message;
            }
        }
        inspect();
    </script>
</body>
</html>
