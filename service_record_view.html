<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복무 기록부 출력 - 레지오 마리애</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* A4 가로 규격 강제 및 최적화 */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 30px 10px;
            /* 좌우 여백 추가 */
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            /* Flex 정렬 제거 (왼쪽 잘림 방지) */
            min-width: 297mm;
            /* 인쇄용 규격 최소값 유지 */
        }

        .print-page {
            width: 297mm;
            height: 210mm;
            background: white;
            padding: 10mm 12mm;
            box-sizing: border-box;
            color: #000;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin: 0 auto 20px;
        }

        @media print {
            .print-page {
                margin: 0 !important;
                page-break-after: always;
            }
        }

        @media print {
            .print-page {
                margin: 0 !important;
                page-break-after: always;
            }
        }

        .record-title {
            text-align: center;
            font-size: 22pt;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 15px;
        }

        .page-counter {
            text-align: right;
            font-size: 9pt;
            margin-right: 5mm;
            margin-top: -5mm;
            margin-bottom: 2mm;
        }

        /* 2단 메인 컨테이너 */
        .main-horizontal-split {
            display: flex;
            gap: 0;
            width: 100%;
            border: 0.3mm solid #000;
            height: calc(210mm - 48mm);
        }

        .left-column {
            flex: 0 0 42%;
            display: flex;
            flex-direction: column;
            border-right: 4.5px double #000;
        }

        .right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border-style: hidden;
        }

        th,
        td {
            border: 0.3mm solid #000;
            padding: 3px 6px;
            font-size: 9pt;
            text-align: center;
            height: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .section-title {
            background-color: transparent;
            font-weight: bold;
            font-size: 10.5pt;
            height: 30px;
            letter-spacing: 5px;
            border-bottom: 4.5px double #000 !important;
        }

        .col-header th {
            border-bottom: 4.5px double #000 !important;
        }

        .label-bg {
            background-color: transparent;
            font-weight: bold;
            width: 70px;
        }

        .personal-info {
            border-bottom: 4.5px double #000;
        }

        .move-history {
            border-bottom: 4.5px double #000;
        }

        .career-history {
            flex: 1;
            overflow: hidden;
        }

        .career-history table {
            height: 100%;
        }

        .education-history {
            flex: 1;
            overflow: hidden;
        }

        .education-history table {
            height: 100%;
        }

        .notes-section {
            border-top: 4.5px double #000;
            padding: 8px 12px;
            height: 35mm;
            box-sizing: border-box;
        }

        .notes-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 10pt;
        }

        .notes-content {
            font-size: 9pt;
            line-height: 1.4;
            overflow: hidden;
        }

        .footer-logo {
            text-align: right;
            font-size: 8pt;
            margin-top: 3px;
            color: #444;
        }

        .print-btn-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-action {
            padding: 10px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .btn-print {
            background-color: #1a73e8;
            color: white;
        }

        .btn-download {
            background-color: #34a853; /* 구글 그린 */
            color: white;
        }

        .btn-close {
            background-color: #333;
            color: white;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .print-page {
                box-shadow: none;
                margin: 0;
                border: none;
            }

            .print-btn-overlay {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="print-btn-overlay">
        <button class="btn-action btn-download" id="btnDownloadPDF"><i class="fas fa-file-pdf"></i> 파일로 저장</button>
        <button class="btn-action btn-print" onclick="window.print()"><i class="fas fa-print"></i> 인쇄하기</button>
        <button class="btn-action btn-close" onclick="window.close()"><i class="fas fa-times"></i> 닫기</button>
    </div>

    <div id="pageContainer"></div>

    <script type="module">
        import { db, doc, getDoc, getDocs, collection, query, where, orderBy } from "./firebase-config.js?v=20260307_2325";
        import { initAuthObserver } from "./auth.js?v=20260303_1210";

        const PAGE_LIMITS = { move: 5, career: 8, education: 16 };

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const memberId = params.get('id');
            if (!memberId) { alert('잘못된 접근입니다.'); window.close(); return; }

            // Fetch Member Data from Firestore
            let member = null;
            try {
                const memberSnap = await getDoc(doc(db, 'members_list', memberId));
                if (memberSnap.exists()) {
                    member = { id: memberSnap.id, ...memberSnap.data() };
                }
            } catch (error) {
                console.error("Error fetching member:", error);
            }

            if (!member) { alert('회원 정보를 찾을 수 없습니다.'); window.close(); return; }

            // Fetch Career Data from Firestore
            const allCareer = [];
            try {
                const qCareer = query(collection(db, 'officers_list'), where('memberId', '==', member.id));
                const qSnapCareer = await getDocs(qCareer);
                qSnapCareer.forEach(d => allCareer.push(d.data()));
                allCareer.sort((a, b) => (a.appointmentDate || "").localeCompare(b.appointmentDate || ""));
            } catch (error) {
                console.error("Error fetching career:", error);
            }

            // Fetch Education/Event Data from Firestore
            const allEvents = [];
            try {
                const qEvents = query(collection(db, 'events_list'), orderBy('eventDate', 'asc'));
                const qSnapEvents = await getDocs(qEvents);
                qSnapEvents.forEach(d => {
                    const data = d.data();
                    const attendeeList = data.attendees || [];
                    // Check if attendee
                    const isAttendee = attendeeList.some(a => (a.uid === member.id || a.id === member.id));
                    // Filter only 'Education' (교육) and 'Retreat' (피정) and exclude '계획' (Planned)
                    const isValidType = (data.type === '교육' || data.type === '피정') && data.category !== '계획';
                    
                    if (isAttendee && isValidType) {
                        allEvents.push(data);
                    }
                });
            } catch (error) {
                console.error("Error fetching events:", error);
            }

            // Calculate Pages
            const moveData = [{ 
                presidiumName: member.presidiumName || '-', 
                curiaName: member.curiaName || '-', 
                churchName: member.churchName || '-', 
                period: `${member.probationaryDate || ''} ~ ${member.leaveDate || ''}` 
            }];
            const totalCareerPages = Math.ceil(allCareer.length / PAGE_LIMITS.career) || 1;
            const totalEduPages = Math.ceil(allEvents.length / PAGE_LIMITS.education) || 1;
            const totalPages = Math.max(totalCareerPages, totalEduPages, 1);

            const container = document.getElementById('pageContainer');
            container.innerHTML = '';

            for (let i = 0; i < totalPages; i++) {
                const pageEl = document.createElement('div');
                pageEl.className = 'print-page';

                const careerSlice = allCareer.slice(i * PAGE_LIMITS.career, (i + 1) * PAGE_LIMITS.career);
                const eduSlice = allEvents.slice(i * PAGE_LIMITS.education, (i + 1) * PAGE_LIMITS.education);
                const isLastPage = (i === totalPages - 1);

                pageEl.innerHTML = `
                    <div class="record-title">행동단원 복무 기록부</div>
                    <div class="page-counter">Page ${i + 1} / ${totalPages}</div>
                    <div class="main-horizontal-split">
                        <div class="left-column">
                            <div class="personal-info">
                                <table>
                                    <tr><th colspan="6" class="section-title">인 적 사 항</th></tr>
                                    <tr><td class="label-bg">성 명</td><td style="font-weight:bold; width:120px;">${member.name}</td><td class="label-bg">본 명</td><td colspan="3" style="font-weight:bold;">${member.baptismalName || ''}</td></tr>
                                    <tr><td class="label-bg">생년월일</td><td>${member.birthDate || ''}</td><td class="label-bg">축 일</td><td>${member.feastDate || ''}</td><td class="label-bg" style="width:40px;">성별</td><td style="width:40px;">${member.gender || '여'}</td></tr>
                                    <tr><td class="label-bg">입 단 일</td><td>${member.probationaryDate || ''}</td><td class="label-bg">선 서 일</td><td colspan="3">${member.promiseDate || ''}</td></tr>
                                    <tr><td class="label-bg">연 락 처</td><td colspan="5">${member.phone || ''}</td></tr>
                                    <tr><td class="label-bg">퇴 단 일</td><td colspan="5">${member.leaveDate || member.retiredDate || member.extinctionDate || ''}</td></tr>
                                </table>
                            </div>
                            <div class="move-history">
                                <table>
                                    <tr><th colspan="4" class="section-title" style="letter-spacing:5px; height:30px;">쁘레시디움 이동 현황</th></tr>
                                    <tr class="col-header" style="height:25px;"><th style="width:25%;">쁘레시디움 명</th><th style="width:25%;">평의회 명</th><th style="width:20%;">본당 명</th><th style="width:30%;">기 간</th></tr>
                                    ${renderMoveRows(i === 0 ? moveData : [])}
                                </table>
                            </div>
                            <div class="career-history">
                                <table>
                                    <tr><th colspan="4" class="section-title" style="letter-spacing:5px; height:30px;">간부 경력 사항</th></tr>
                                    <tr class="col-header" style="height:25px;"><th style="width:25%;">소 속</th><th style="width:20%;">직 책</th><th style="width:20%;">본당 명</th><th style="width:35%;">기 간</th></tr>
                                    ${renderCareerRows(careerSlice, member)}
                                </table>
                            </div>
                        </div>
                        <div class="right-column">
                            <div class="education-history">
                                <table>
                                    <tr><th colspan="4" class="section-title" style="letter-spacing:5px; height:30px;">주요 교육 및 피정 참석 현황</th></tr>
                                    <tr class="col-header" style="height:25px;"><th style="width:20%;">소 속</th><th style="width:22%;">일 자(기 간)</th><th style="width:38%;">내 용</th><th style="width:20%;">주 관</th></tr>
                                    ${renderEduRows(eduSlice, member)}
                                </table>
                            </div>
                            <div class="notes-section">
                                <div class="notes-title">특기 및 참고 사항 :</div>
                                <div class="notes-content">${isLastPage ? (member.notes || '').replace(/\n/g, '<br>') : '(다음 페이지에 계속...)'}</div>
                            </div>
                        </div>
                    </div>
                    <div class="footer-logo">서울 무염시태 세나뚜스 양식 제24호(2014년 2월 개정)</div>
                `;
                container.appendChild(pageEl);
            }

            setTimeout(applyTextFitting, 200);

            // PDF 다운로드 버튼 이벤트 리스너 연결
            const btnDownload = document.getElementById('btnDownloadPDF');
            if (btnDownload) {
                btnDownload.addEventListener('click', function() {
                    const original = document.getElementById('pageContainer');
                    const fileName = `${member.name}_복무기록부.pdf`;
                    const btn = this;
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장 중...';
                    btn.disabled = true;

                    // 인쇄 최적화를 위해 임시 스타일 제거
                    const originalPages = original.querySelectorAll('.print-page');
                    originalPages.forEach(p => {
                        p.style.margin = '0';
                        p.style.boxShadow = 'none';
                    });

                    window.scrollTo(0, 0); // 화면 스크롤로 인한 캡처 짤림 방지

                    const opt = {
                        margin:       0,
                        filename:     fileName,
                        image:        { type: 'jpeg', quality: 1.0 },
                        html2canvas:  { 
                            scale: 3, 
                            useCORS: true,
                            scrollY: 0,
                            scrollX: 0,
                            onclone: (clonedDoc) => {
                                // 1. 유령 노드 제거
                                const clonedElement = clonedDoc.getElementById('pageContainer');
                                Array.from(clonedElement.childNodes).forEach(node => {
                                    if (node.nodeType === 3 || (node.nodeType === 1 && !node.classList.contains('print-page'))) {
                                        node.remove();
                                    }
                                });

                                // 2. 바디 및 최상위 요소 초기화 (클론 문서)
                                const d = clonedDoc.documentElement;
                                const b = clonedDoc.body;
                                [d, b].forEach(el => {
                                    el.style.margin = '0';
                                    el.style.padding = '0';
                                    el.style.width = '297mm';
                                    el.style.background = '#fff';
                                });

                                // 3. CSS 주입 (클론 문서 전용 스타일)
                                const styleNode = clonedDoc.createElement('style');
                                styleNode.textContent = `
                                    #pageContainer {
                                        width: 297mm !important;
                                        margin: 0 !important;
                                        padding: 0 !important;
                                        overflow: hidden !important;
                                    }

                                    #pageContainer .print-page {
                                        width: 297mm !important;
                                        height: 207mm !important; /* 여유 있게 207mm로 설정하여 백지 원천 봉쇄 */
                                        padding: 10mm 12mm !important;
                                        margin: 0 !important;
                                        box-sizing: border-box !important;
                                        background: #fff !important;
                                        box-shadow: none !important;
                                        border: none !important;
                                        overflow: hidden !important;
                                        page-break-after: avoid !important;
                                        page-break-before: avoid !important;
                                        page-break-inside: avoid !important;
                                    }

                                    /* 1. 모든 요소의 기본 테두리 초기화 */
                                    #pageContainer * { border: none !important; box-shadow: none !important; }

                                    /* 2. 외곽 프레임 및 구분선 (이중선 시뮬레이션) */
                                    .main-horizontal-split {
                                        border: 0.1px solid #555 !important;
                                        display: flex !important;
                                        background-color: #fff !important;
                                    }
                                    .left-column {
                                        border-right: 3px double #000 !important;
                                    }
                                    .personal-info, .move-history {
                                        border-bottom: 3px double #000 !important;
                                    }
                                    .section-title, .col-header th {
                                        border-bottom: 3px double #000 !important;
                                    }
                                    .notes-section {
                                        border-top: 3px double #000 !important;
                                    }

                                    /* 3. [혁신] 테두리 대신 배경색 격자 방식 사용 (선 굵기 문제 완전 해결) */
                                    table {
                                        border-collapse: separate !important;
                                        border-spacing: 0.3px !important; /* 이 간격이 선의 두께가 됩니다 */
                                        background-color: #555 !important; /* 선의 색상 */
                                        width: 100% !important;
                                    }
                                    th, td {
                                        background-color: #fff !important; /* 칸의 배경색 */
                                        padding: 3px 6px !important;
                                        font-size: 8.5pt !important;
                                        text-align: center !important;
                                        height: auto !important;
                                    }

                                    /* 표의 바깥쪽 테두리가 겹치지 않도록 조정 */
                                    .personal-info table, .move-history table, .career-history table, .education-history table {
                                        border: none !important;
                                    }
                                `;
                                clonedDoc.head.appendChild(styleNode);
                            }
                        },
                        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' },
                        pagebreak:    { mode: 'avoid' }
                    };

                    // [긴급] 모바일 뷰포트 찌그러짐 방지를 위해 실제 DOM 일시 수정
                    const bodyOriginalWidth = document.body.style.width;
                    const containerOriginalWidth = original.style.width;
                    document.body.style.width = '297mm';
                    original.style.width = '297mm';

                    const targetElement = document.querySelector('.print-page');
                    html2pdf().set(opt).from(targetElement).save().then(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        
                        // 원상 복구
                        document.body.style.width = bodyOriginalWidth;
                        original.style.width = containerOriginalWidth;
                        originalPages.forEach(p => {
                            p.style.margin = '';
                            p.style.boxShadow = '';
                        });
                    }).catch(err => {
                        console.error('PDF 생성 에러:', err);
                        alert('PDF 생성 중 오류가 발생했습니다: ' + err.message);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        
                        // 에러 시에도 원상 복구
                        document.body.style.width = bodyOriginalWidth;
                        original.style.width = containerOriginalWidth;
                        originalPages.forEach(p => {
                            p.style.margin = '';
                            p.style.boxShadow = '';
                        });
                    });
                });
            }
        }

        function renderMoveRows(data) {
            let html = '';
            for (let i = 0; i < PAGE_LIMITS.move; i++) {
                const item = data[i] || { presidiumName: '&nbsp;', curiaName: '&nbsp;', churchName: '&nbsp;', period: '~' };
                html += `<tr><td>${item.presidiumName || item.pr || '&nbsp;'}</td><td>${item.curiaName || '-'}</td><td>${item.churchName || '-'}</td><td>${item.period}</td></tr>`;
            }
            return html;
        }

        function renderCareerRows(data, member) {
            let html = '';
            for (let i = 0; i < PAGE_LIMITS.career; i++) {
                const o = data[i];
                if (o) {
                    const prName = o.presidiumName || '-';
                    const churchName = o.churchName || '-';
                    html += `<tr><td>${prName}</td><td>${o.role}</td><td>${churchName}</td><td>${o.appointmentDate} ~ ${o.appointmentExpiryDate || ''}</td></tr>`;
                }
                else html += '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>~</td></tr>';
            }
            return html;
        }

        function renderEduRows(data, member) {
            let html = '';
            for (let i = 0; i < PAGE_LIMITS.education; i++) {
                const e = data[i];
                if (e) {
                    const prName = e.presidiumName || '';
                    html += `<tr><td>${prName}</td><td>${e.eventDate}</td><td style="text-align:left;">${e.eventName}</td><td>${e.organizer || '-'}</td></tr>`;
                }
                else html += '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>';
            }
            return html;
        }

        function applyTextFitting() {
            const cells = document.querySelectorAll('td');
            cells.forEach(cell => {
                if (!cell.textContent.trim() || cell.classList.contains('section-title') || cell.classList.contains('label-bg')) return;
                if (!cell.querySelector('.fit-wrapper')) {
                    const text = cell.innerHTML;
                    cell.innerHTML = `<span class="fit-wrapper" style="display:inline-block; white-space:nowrap;">${text}</span>`;
                }
                const wrapper = cell.querySelector('.fit-wrapper');
                const containerWidth = cell.offsetWidth - 10;
                let fontSize = 9;
                wrapper.style.fontSize = fontSize + 'pt';
                while (wrapper.offsetWidth > containerWidth && fontSize > 6) {
                    fontSize -= 0.5;
                    wrapper.style.fontSize = fontSize + 'pt';
                }
            });
        }

        // Run on load
        initAuthObserver((user) => {
            if (user) {
                init();
            } else {
                window.close();
            }
        }, () => { window.close(); });
    </script>
    <script src="script.js?v=20260505_1711"></script>
</body>

</html>
