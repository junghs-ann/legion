<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>데이터 ID 연결 복구 도구 (V17.0)</title>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .log-area { background: #f4f4f4; padding: 15px; height: 300px; overflow-y: auto; border-radius: 4px; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; }
        .btn-repair { background: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 20px; }
        .status-ok { color: #27ae60; font-weight: bold; }
        .status-fail { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔧 데이터 ID 연결 복구 도구</h2>
        <p>이 도구는 <strong>성명 + 세례명 + 성당</strong> 정보를 대조하여, 명부 ID(memberId)가 누락되거나 틀어진 계정들을 전수 조사하여 복구합니다.</p>
        <p style="color: #e67e22;">※ 이 작업은 데이터베이스를 직접 수정하므로 신중히 진행해 주세요.</p>
        
        <div id="log" class="log-area">대기 중...</div>
        
        <button id="btnStart" class="btn-repair">복구 프로세스 시작</button>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const logArea = document.getElementById('log');
        const btnStart = document.getElementById('btnStart');

        function log(msg, type='') {
            const time = new Date().toLocaleTimeString();
            let style = '';
            if (type === 'ok') style = 'class="status-ok"';
            if (type === 'fail') style = 'class="status-fail"';
            logArea.innerHTML += `<div ${style}>[${time}] ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        btnStart.onclick = async () => {
            if (!confirm("모든 사용자 계정을 명부와 대조하여 복구하겠습니까?")) return;
            
            btnStart.disabled = true;
            logArea.innerHTML = '';
            log("🚀 복구 시작...");

            try {
                // 1. 데이터 로드
                log("기초 데이터(사용자, 명부)를 가져오는 중...");
                const userSnap = await getDocs(collection(db, "users"));
                const memberSnap = await getDocs(collection(db, "members_list"));
                
                const users = userSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
                const members = memberSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                log(`대상: 사용자(${users.length}명), 명부(${members.length}명)`);

                let repairCount = 0;
                let failCount = 0;

                const norm = (s) => (s || '').toString().trim().replace(/\s+/g, ' ');

                for (const u of users) {
                    const uName = norm(u.name || u.memberName);
                    const uBaptismal = norm(u.baptismalName);
                    const uChurch = norm(u.churchName);
                    
                    if (!uName || !uChurch) {
                        log(`[Skip] 필수 정보 누락 - UID: ${u.uid}`, 'fail');
                        continue;
                    }

                    // 명부에서 매칭되는 단원 찾기
                    const match = members.find(m => 
                        norm(m.name) === uName && 
                        norm(m.baptismalName) === uBaptismal && 
                        norm(m.churchName) === uChurch
                    );

                    if (match) {
                        if (u.memberId === match.id) {
                            // 이미 일치함
                        } else {
                            log(`[Matching] ${uName} (${uBaptismal}) -> 명부 ID(${match.id}) 연결 중...`);
                            await updateDoc(doc(db, "users", u.uid), {
                                memberId: match.id,
                                id: match.id // id 필드도 동기화 (auth.js 로직 보완용)
                            });
                            repairCount++;
                            log(`[SUCCESS] ${uName} 복구 완료`, 'ok');
                        }
                    } else {
                        log(`[Not Found] ${uName} (${uBaptismal}) 와 일치하는 명부 데이터를 찾을 수 없습니다.`, 'fail');
                        failCount++;
                    }
                }

                log(`\n✅ 복구 완료!`);
                log(`총 복구 인원: ${repairCount}명`);
                log(`매칭 실패: ${failCount}명`);
                log(`이제 화면에서 정상적으로 조회되는지 확인해 보세요.`);

            } catch (err) {
                log(`❌ 오류 발생: ${err.message}`, 'fail');
                console.error(err);
            } finally {
                btnStart.disabled = false;
            }
        };
    </script>
</body>
</html>
