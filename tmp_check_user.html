<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사용자 데이터 진단 도구</title>
</head>
<body>
    <h1>현재 로그인된 사용자 정보 진단</h1>
    <div id="log" style="white-space: pre-wrap; font-family: monospace; padding: 20px; border: 1px solid #ccc; background: #f9f9f9;">데이터를 불러오는 중...</div>
    <hr>
    <h3>비교 대상 (URL 파라미터)</h3>
    <div id="params" style="white-space: pre-wrap; font-family: monospace; padding: 20px; background: #eef;"></div>

    <script type="module">
        import { db, doc, getDoc } from "./firebase-config.js";
        import { initAuthObserver } from "./auth.js";
        
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('params').textContent = JSON.stringify({
            churchName: urlParams.get('churchName'),
            presidiumName: urlParams.get('presidiumName'),
            role_in_param: urlParams.get('role')
        }, null, 2);

        initAuthObserver(async (user, profile) => {
            const logEl = document.getElementById('log');
            if (profile) {
                logEl.textContent = "=== 사용자 프로필 (Firestore) ===\n" + JSON.stringify(profile, null, 2);
            } else {
                logEl.textContent = "사용자 프로필을 찾을 수 없습니다. (Firestore jhs0121 확인 필요)";
            }
        });
    </script>
</body>
</html>
