<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>데이터 수리 도구 - 세례명 정정</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #log { background: #f4f4f4; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>정혜숙 단원 세례명 정정 도구 (아네스 ➔ 아녜스)</h1>
    <p>이 도구는 시스템 전반의 '아네스' 표기를 '아녜스'로 일괄 변경합니다.</p>
    <button id="btnStart" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">수정 시작</button>
    <div id="log">준비됨.</div>

    <script type="module">
        import { db, doc, getDoc, updateDoc, collection, getDocs, query, where } from "./firebase-config.js";

        const logDiv = document.getElementById('log');
        const btnStart = document.getElementById('btnStart');

        function addLog(msg, type = '') {
            const span = document.createElement('div');
            if (type) span.className = type;
            span.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(span);
        }

        btnStart.onclick = async () => {
            btnStart.disabled = true;
            logDiv.innerHTML = '';
            addLog("작업 시작...");

            const uid = "N2vp67a9GG2u1i3HnM7D";
            const oldName = "아네스";
            const newName = "아녜스";

            try {
                // 1. members_list 수정 (문서 ID가 UID임)
                addLog("1. members_list 조회 중...");
                const mRef = doc(db, 'members_list', uid);
                const mSnap = await getDoc(mRef);
                if (mSnap.exists()) {
                    const data = mSnap.data();
                    await updateDoc(mRef, {
                        baptismalName: newName,
                        name: (data.name || '').replace(oldName, newName)
                    });
                    addLog("members_list 업데이트 성공!", "success");
                } else {
                    addLog("members_list에서 해당 단원을 찾을 수 없습니다.", "error");
                }

                // 2. officers_list 수정 (memberId 필드로 매칭)
                addLog("2. officers_list 조회 중...");
                const oQuery = query(collection(db, 'officers_list'), where('memberId', '==', uid));
                const oSnap = await getDocs(oQuery);
                if (!oSnap.empty) {
                    for (const d of oSnap.docs) {
                        const data = d.data();
                        await updateDoc(d.ref, {
                            baptismalName: newName,
                            name: (data.name || '').replace(oldName, newName)
                        });
                        addLog(`officers_list (${d.id}) 업데이트 성공!`, "success");
                    }
                } else {
                    addLog("officers_list에서 해당 간부 정보를 찾을 수 없습니다.");
                }

                // 3. users 컬렉션 수정 (uid 필드로 매칭)
                addLog("3. users 컬렉션 조회 중...");
                const uQuery = query(collection(db, 'users'), where('uid', '==', uid));
                const uSnap = await getDocs(uQuery);
                if (!uSnap.empty) {
                    for (const d of uSnap.docs) {
                        await updateDoc(d.ref, { baptismalName: newName });
                        addLog(`users (${d.id}) 업데이트 성공!`, "success");
                    }
                } else {
                    addLog("users 컬렉션에서 해당 계정을 찾을 수 없습니다.");
                }

                addLog("모든 작업이 성공적으로 완료되었습니다!", "success");
            } catch (e) {
                console.error(e);
                addLog("오류 발생: " + e.message, "error");
            } finally {
                btnStart.disabled = false;
            }
        };
    </script>
</body>
</html>
