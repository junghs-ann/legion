    <script src="script.js?v=20260403_1930"></script>
    <script type="module">
        import { db, collection, query, where, getDocs, orderBy, updateDoc, doc } from "./firebase-config.js?v=20260320_0835";
        import { initAuthObserver, logoutUser } from "./auth.js?v=20260320_0835";
        import { fetchPresidiaList, getChurches, getCuriae, getPresidia } from "./data.js?v=20260320_0835";

        let currentUser = null;
        let isAdmin = false;

        const churchFilter = document.getElementById('churchFilter');
        const curiaFilter = document.getElementById('curiaFilter');
        const presidiumSearch = document.getElementById('presidiumSearch');
        const presidiumDropdown = document.getElementById('presidiumDropdown');
        const presidiumFilter = document.getElementById('presidiumFilter');
        const typeFilter = document.getElementById('typeFilter');
        const statusFilter = document.getElementById('statusFilter');
        const startDateFilter = document.getElementById('startDateFilter');
        const endDateFilter = document.getElementById('endDateFilter');
        const nameFilter = document.getElementById('nameFilter');
        const statusContent = document.getElementById('statusContent');
        const praeBody = document.getElementById('praeBody');
        const adjBody = document.getElementById('adjBody');
        const praeSection = document.getElementById('praeSection');
        const adjSection = document.getElementById('adjSection');
        const noDataMsg = document.getElementById('noDataMsg');
        const btnSearch = document.getElementById('btnSearch');

        initAuthObserver(async (user, profile) => {
            currentUser = profile;
            if (window.initCommonMenus) window.initCommonMenus(profile, logoutUser);

            const role = String(profile.role || '').replace(/\s/g, '').toLowerCase();
            isAdmin = (role === 'admin' || role === '관리자');

            await fetchPresidiaList();
            setupControls(profile);
            setupEventListeners();
            
            // 페이지 진입 시 자동 조회 수행
            await loadReport();
        }, () => {
            location.href = 'index.html';
        });

        function renderPresidiumDropdown(filterText = '') {
            if (!isAdmin) return;
            const selectedChurch = churchFilter.value;
            const selectedCuria = curiaFilter.value;
            if (!selectedChurch || !selectedCuria) return;

            const allPresidia = getPresidia(selectedChurch, selectedCuria);
            const filtered = allPresidia.filter(p =>
                (p.name || '').includes(filterText)
            ).map(p => p.name).sort();

            presidiumDropdown.innerHTML = '';
            if (filtered.length > 0) {
                filtered.forEach(name => {
                    const div = document.createElement('div');
                    div.textContent = name;
                    div.onclick = () => {
                        presidiumSearch.value = name;
                        presidiumFilter.value = name;
                        presidiumDropdown.style.display = 'none';
                    };
                    presidiumDropdown.appendChild(div);
                });
                presidiumDropdown.style.display = 'block';
            } else {
                presidiumDropdown.style.display = 'none';
            }
        }

        function setupControls(profile) {
            const ci = document.getElementById('churchInput');
            const cui = document.getElementById('curiaInput');
            const pi = document.getElementById('presidiumInput');

            if (isAdmin) {
                churchFilter.style.display = 'block';
                ci.style.display = 'none';
                churchFilter.disabled = false;
                loadFilters();
            } else {
                churchFilter.style.display = 'none';
                ci.style.display = 'block';
                ci.value = profile.churchName || '';
                curiaFilter.style.display = 'none';
                cui.style.display = 'block';
                cui.value = profile.curiaName || '';
                presidiumSearch.value = profile.presidiumName || '';
                presidiumFilter.value = profile.presidiumName || '';
                presidiumSearch.disabled = true;

                pi.style.display = 'none';
            }
        }

        function loadFilters() {
            const churches = getChurches();
            churchFilter.innerHTML = '<option value="">전체</option>';
            churches.forEach(c => churchFilter.add(new Option(c, c)));

            churchFilter.onchange = () => {
                const selected = churchFilter.value;
                curiaFilter.innerHTML = '<option value="">전체</option>';
                presidiumFilter.value = '';
                presidiumSearch.value = '';
                if (selected) {
                    getCuriae(selected).forEach(c => curiaFilter.add(new Option(c, c)));
                    curiaFilter.disabled = false;
                } else {
                    curiaFilter.disabled = true;
                    presidiumFilter.disabled = true;
                }
            };

            curiaFilter.onchange = () => {
                presidiumFilter.value = '';
                presidiumSearch.value = '';
            };
        }

        async function loadReport() {
            // [진단용] 시작 알림
            console.warn("[CHECK] loadReport 호출됨");
            
            let church, curia, presidium;
            if (isAdmin) {
                church = (churchFilter.value || '').trim();
                curia = (curiaFilter.value || '').trim();
                presidium = (presidiumSearch.value || '').trim();
            } else {
                church = (currentUser.churchName || '').trim();
                curia = (currentUser.curiaName || '').trim();
                presidium = (currentUser.presidiumName || '').trim();
            }

            const type = typeFilter.value;
            const status = statusFilter.value;
            const start = startDateFilter.value;
            const end = endDateFilter.value;
            const name = nameFilter.value.trim();

            console.log(`[QUERY PARAMS] Church: "${church}", Curia: "${curia}", Pr: "${presidium}"`);

            // UI 초기화 및 로딩 표시
            // 소제목 영역을 먼저 표시하여 사용자님의 의구심 해결
            statusContent.style.display = 'block'; 
            statusContent.style.opacity = '0.5'; // 로딩 중에는 흐리게
            noDataMsg.style.display = 'block';
            noDataMsg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 데이터를 불러오는 중입니다...';

            // showPrae, showAdj 정의 (누락 복구)
            const showPrae = (type === '전체' || type === '쁘레또리움');
            const showAdj = (type === '전체' || type === '아듀또리움');

            try {
                let praeList = [];
                let adjList = [];
                let memberList = [];

                // 1. 데이터 조회 쿼리 구성
                // members_list는 성당 필터링에서 제외 (성당 필드가 없을 수 있음)
                const [praeSnap, adjSnap, memSnap] = await Promise.all([
                    getDocs(church ? query(collection(db, 'praetorium_list'), where('churchName', '==', church)) : collection(db, 'praetorium_list')),
                    getDocs(church ? query(collection(db, 'adjutorium_members_list'), where('churchName', '==', church)) : collection(db, 'adjutorium_members_list')),
                    getDocs(collection(db, 'members_list'))
                ]);

                praeSnap.forEach(doc => praeList.push({ id: doc.id, ...doc.data() }));
                adjSnap.forEach(doc => adjList.push({ id: doc.id, ...doc.data() }));
                memSnap.forEach(doc => memberList.push({ id: doc.id, ...doc.data() }));

                console.error(`[DATA DIAGNOSIS] Fetched counts -> Prae: ${praeList.length}, Adj: ${adjList.length}, Members: ${memberList.length}`);
                
                // 과거 필드명(church) 때문에 누락되는 경우 대조 진단
                if (church && praeList.length === 0) {
                    const legacySnap = await getDocs(query(collection(db, 'praetorium_list'), where('church', '==', church)));
                    if (legacySnap.size > 0) {
                        const msg = `[경고] '${church}' 성당 데이터 ${legacySnap.size}건이 구버전 필드명(church)을 사용 중이라 누락되었습니다.`;
                        console.error(msg);
                        alert(msg + "\n\n표준 필드명(churchName)으로 데이터 정제가 필요합니다.");
                    }
                }

                const membersMap = {}; 
                memberList.forEach(m => membersMap[String(m.id)] = m);

                // 2. 필터링
                let fPrae = praeList.filter(r => {
                    const rChurch = (r.churchName || '').trim();
                    const rCuria = (r.curiaName || '').trim();
                    const rPresidium = (r.presidiumName || '').trim();
                    const rName = (r.memberName || '').trim();
                    const matchC = !church || rChurch === church;
                    const matchCu = !curia || rCuria === curia;
                    const matchP = !presidium || rPresidium === presidium;
                    const matchN = !name || rName.includes(name);
                    const s = r.status === 'active' ? '활동' : '퇴단';
                    const matchS = status === '전체' || s === status;
                    const matchD = (!start || r.joinDate >= start) && (!end || r.joinDate <= end);
                    return matchC && matchCu && matchP && matchN && matchS && matchD;
                });

                let fAdj = adjList.filter(r => {
                    const rChurch = (r.churchName || '').trim();
                    const rCuria = (r.curiaName || '').trim();
                    const rPresidium = (r.presidiumName || '').trim();
                    const rName = (r.name || '').trim();
                    const matchC = !church || rChurch === church;
                    const matchCu = !curia || rCuria === curia;
                    const matchP = !presidium || rPresidium === presidium;
                    const matchN = !name || rName.includes(name);
                    const s = r.withdrawalDate ? '퇴단' : '활동';
                    const matchS = status === '전체' || s === status;
                    const matchD = (!start || r.admissionDate >= start) && (!end || r.admissionDate <= end);
                    return matchC && matchCu && matchP && matchN && matchS && matchD;
                });

                console.error(`[DATA DIAGNOSIS] After Filtering -> Prae: ${fPrae.length}, Adj: ${fAdj.length}`);

                if (fPrae.length === 0 && fAdj.length === 0) {
                    statusContent.style.opacity = '1';
                    noDataMsg.style.display = 'block';
                    noDataMsg.textContent = '해당 조건의 현황 데이터가 없습니다.';
                    praeSection.style.display = 'none';
                    adjSection.style.display = 'none';
                    return;
                }

                statusContent.style.display = 'block';
                statusContent.style.opacity = '1';
                noDataMsg.style.display = 'none';

                document.getElementById('reportDateRange').textContent = (start || end) ? `( ${start || '초기'} ~ ${end || '현재'} 입단일 기준 )` : '( 전 기간 )';

                // 렌더링 쁘레
                if (showPrae) {
                    praeBody.innerHTML = '';
                    if (fPrae.length === 0) {
                        praeBody.innerHTML = '<tr><td colspan="7" style="padding:40px; color:#999; font-size:1.1rem;">해당 데이터가 없습니다.</td></tr>';
                    } else {
                        fPrae.sort((a, b) => (b.joinDate || '').localeCompare(a.joinDate || '')).forEach(r => {
                            const m = membersMap[String(r.memberId)] || {};
                            const baptismalName = r.baptismalName || m.baptismalName || '-';
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td><span class="badge-${r.status === 'active' ? 'active' : 'retire'}">${r.status === 'active' ? '활동' : '퇴단'}</span></td>
                                <td>${r.memberName || '-'}</td>
                                <td>${baptismalName}</td>
                                <td>${r.presidiumName || '-'}</td>
                                <td>${r.joinDate || '-'}</td>
                                <td>${r.leaveDate || '-'}</td>
                                <td class="text-left">${m.notes || '-'}</td>
                            `;
                            praeBody.appendChild(tr);
                        });
                    }
                }

                // 렌더링 아듀
                if (showAdj) {
                    adjBody.innerHTML = '';
                    if (fAdj.length === 0) {
                        adjBody.innerHTML = '<tr><td colspan="8" style="padding:40px; color:#999; font-size:1.1rem;">해당 데이터가 없습니다.</td></tr>';
                    } else {
                        fAdj.sort((a, b) => (a.admissionDate || '').localeCompare(b.admissionDate || '')).forEach(r => {
                            const tr = document.createElement('tr');
                            const sClass = r.withdrawalDate ? 'retire' : 'active';
                            const sText = r.withdrawalDate ? '퇴단' : '활동';
                            tr.innerHTML = `
                                <td><span class="badge-${sClass}">${sText}</span></td>
                                <td>${r.name || '-'}</td>
                                <td>${r.baptismalName || '-'}</td>
                                <td>${r.gender || '-'}</td>
                                <td>${r.presidiumName || '-'}</td>
                                <td>${r.admissionDate || '-'}</td>
                                <td>${r.withdrawalDate || '-'}</td>
                                <td class="text-left">${r.notes || '-'}</td>
                            `;
                            adjBody.appendChild(tr);
                        });
                    }
                }
            } catch (error) {
                console.error("Error loading status report:", error);
                noDataMsg.style.display = 'block';
                noDataMsg.innerHTML = `<span style="color: #dc3545;"><i class="fas fa-exclamation-circle"></i> 데이터를 불러오는 중 오류가 발생했습니다.</span><br><small>${error.message}</small>`;
                if (error.code === 'permission-denied') {
                    noDataMsg.innerHTML += '<br><small>권한이 부족합니다. 관리자에게 문의하세요.</small>';
                }
            }
        }

        function setupEventListeners() {
            btnSearch.onclick = async () => await loadReport();

            presidiumSearch.onfocus = () => renderPresidiumDropdown(presidiumSearch.value);
            presidiumSearch.oninput = () => renderPresidiumDropdown(presidiumSearch.value);

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.custom-select-wrapper')) {
                    presidiumDropdown.style.display = 'none';
                }
            });

            [typeFilter, statusFilter, startDateFilter, endDateFilter, nameFilter].forEach(f => {
                f.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); loadReport(); } });
            });

            // Enter 키 이동 및 검색 바 추가
            if (isAdmin) {
                presidiumSearch.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        loadReport();
                    }
                });
            }
        }
    </script>
</body>

</html>
