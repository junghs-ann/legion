<!DOCTYPE html>
<html>

<head>
    <title>LocalStorage Debugger</title>
</head>

<body>
    <h1>LocalStorage Debugger</h1>
    <pre id="output"></pre>
    <script>
        const data = {
            presidia_list: JSON.parse(localStorage.getItem('presidia_list') || '[]'),
            currentUser: JSON.parse(localStorage.getItem('currentUser') || '{}'),
            users: JSON.parse(localStorage.getItem('users') || '{}')
        };
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        console.log("Full LocalStorage Data:", data);
    </script>
<script src="script.js?v=20260303_1255_fix"></script>
</body>

</html>
